<app-header></app-header>

<main class="success-page">
  <section class="success-card">
    <div class="icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10" />
        <path d="m8 12 2.7 2.7L16 9.4" />
      </svg>
    </div>
    <h1>Payment Successful</h1>
    <p>Your donation has been completed successfully.</p>

    <div class="details">
      <div class="row">
        <span>Charity</span>
        <strong>{{ charityName }}</strong>
      </div>
      <div class="row">
        <span>Amount</span>
        <strong>₹{{ amount }}</strong>
      </div>
      <div class="row">
        <span>Payment Method</span>
        <strong>{{ paymentMethod }}</strong>
      </div>
      <div class="row">
        <span>Reference</span>
        <strong>{{ reference }}</strong>
      </div>
    </div>

    <div class="actions">
      <a routerLink="/" class="btn btn-primary">Go to Home</a>
      <a routerLink="/donate" class="btn btn-secondary">Donate Again</a>
    </div>

    <section class="share-section">
      <h2>Share this on social media</h2>
      <p class="share-copy">{{ shareText }}</p>

      <div class="share-links">
        <a [href]="whatsappShareLink" target="_blank" rel="noopener noreferrer" class="share-btn">WhatsApp</a>
        <a [href]="twitterShareLink" target="_blank" rel="noopener noreferrer" class="share-btn">X</a>
        <a [href]="facebookShareLink" target="_blank" rel="noopener noreferrer" class="share-btn">Facebook</a>
        <a [href]="linkedInShareLink" target="_blank" rel="noopener noreferrer" class="share-btn">LinkedIn</a>
      </div>

      <div class="share-link-row">
        <input type="text" [value]="shareUrl" readonly class="share-link-input" />
        <button type="button" class="copy-btn" (click)="copyShareText()">{{ copied ? 'Copied' : 'Copy Post + Link' }}</button>
      </div>
    </section>
  </section>
</main>

<app-footer></app-footer>
