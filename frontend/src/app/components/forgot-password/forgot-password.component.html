<app-header></app-header>

<main class="reset-page">
  <section class="card">
    <h1>Forgot Password</h1>
    <p>Use OTP verification to reset your password.</p>

    <label>Email</label>
    <input [(ngModel)]="email" type="email" placeholder="you@example.com" />

    <button class="btn" (click)="sendOtp()" [disabled]="loading || !email">
      {{ loading ? 'Sending...' : (otpSent ? 'Resend OTP' : 'Send OTP') }}
    </button>
    <button class="btn btn-light" *ngIf="otpSent" (click)="sendOtp()" [disabled]="loading || resendCooldown > 0">
      {{ resendCooldown > 0 ? ('Resend in ' + resendCooldown + 's') : 'Resend OTP' }}
    </button>

    <div *ngIf="otpSent" class="otp-panel">
      <label>OTP</label>
      <input [(ngModel)]="otp" type="text" placeholder="Enter OTP" />

      <button class="btn" (click)="verifyOtp()" [disabled]="otpVerifying || !otp">
        {{ otpVerifying ? 'Verifying...' : (otpVerified ? 'OTP Verified ✓' : 'Verify OTP') }}
      </button>

      <label>New Password</label>
      <input [(ngModel)]="newPassword" type="password" placeholder="New password" />

      <label>Confirm Password</label>
      <input [(ngModel)]="confirmPassword" type="password" placeholder="Confirm password" />

      <button class="btn" (click)="resetPassword()" [disabled]="loading || !otpVerified || !newPassword || !confirmPassword">
        {{ loading ? 'Resetting...' : 'Reset Password' }}
      </button>
    </div>

    <p class="success" *ngIf="message">{{ message }}</p>
    <p class="error" *ngIf="error">{{ error }}</p>

    <a routerLink="/login" class="back-link">Back to login</a>
  </section>
</main>

<app-footer></app-footer>
