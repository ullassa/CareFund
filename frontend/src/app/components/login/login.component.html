<app-header></app-header>

<div class="login-page">
  <div class="login-container">
    <div class="login-card">
      <h1>Welcome Back</h1>
      <p class="subtitle">Login to your CareFund account</p>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        <!-- Email -->
        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            formControlName="email"
            placeholder="your.email@example.com"
            class="form-control"
            [class.is-invalid]="submitted && email?.invalid"
          >
          <div *ngIf="submitted && email?.invalid" class="error-message">
            <span *ngIf="email?.errors?.['required']">Email is required</span>
            <span *ngIf="email?.errors?.['email']">Please enter a valid email</span>
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input
              [type]="showPassword ? 'text' : 'password'"
              id="password"
              formControlName="password"
              placeholder="Enter your password"
              class="form-control"
              [class.is-invalid]="submitted && password?.invalid"
            >
            <button
              type="button"
              class="password-toggle"
              (click)="togglePasswordVisibility()"
              title="Toggle password visibility"
            >
              {{ showPassword ? '👁️' : '👁️‍🗨️' }}
            </button>
          </div>
          <div *ngIf="submitted && password?.invalid" class="error-message">
            <span *ngIf="password?.errors?.['required']">Password is required</span>
            <span *ngIf="password?.errors?.['minlength']">Password must be at least 6 characters</span>
          </div>
        </div>

        <!-- Error Message -->
        <div *ngIf="errorMessage" class="alert alert-error">
          {{ errorMessage }}
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn btn-primary" [disabled]="isLoading">
          {{ isLoading ? 'Logging in...' : 'Login' }}
        </button>
      </form>

      <!-- Forgot Password Link -->
      <div class="forgot-password">
        <a href="#forgot-password">Forgot your password?</a>
      </div>

      <!-- Signup Links -->
      <div class="signup-section">
        <p>Don't have an account?</p>
        <div class="signup-buttons">
          <a routerLink="/customer-signup" class="btn btn-secondary btn-block">
            Signup as Donor
          </a>
          <a routerLink="/charity-signup" class="btn btn-secondary btn-block">
            Signup as Charity
          </a>
        </div>
      </div>
    </div>

    <!-- Illustration -->
    <div class="login-illustration">
      <div class="illustration-icon">🔐</div>
    </div>
  </div>
</div>

<app-footer></app-footer>
