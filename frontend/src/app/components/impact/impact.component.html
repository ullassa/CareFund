<app-header></app-header>

<div class="impact-page">
  <!-- Hero Section -->
  <section class="impact-hero">
    <div class="hero-content">
      <h1>Our Impact</h1>
      <p>Real data from active fundraising campaigns</p>
    </div>
  </section>

  <!-- Impact Metrics -->
  <section class="impact-metrics">
    <div class="container">
      <div class="metrics-grid">
        <div class="metric-card" *ngFor="let metric of metrics">
          <div class="metric-icon" [ngSwitch]="metric.icon" aria-hidden="true">
            <svg *ngSwitchCase="'raised'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2v20" />
              <path d="M7.5 6.5h7a3 3 0 1 1 0 6h-5a3 3 0 1 0 0 6h7" />
            </svg>
            <svg *ngSwitchCase="'partners'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2" />
              <circle cx="9.5" cy="8" r="3" />
              <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
              <path d="M16.5 4.13a3 3 0 0 1 0 5.74" />
            </svg>
            <svg *ngSwitchCase="'target'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="9" />
              <circle cx="12" cy="12" r="5" />
              <circle cx="12" cy="12" r="1.5" />
            </svg>
            <svg *ngSwitchDefault viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 17l6-6 4 4 8-8" />
              <path d="M21 10V4h-6" />
            </svg>
          </div>
          <h3>{{ metric.label }}</h3>
          <p class="metric-value">{{ metric.value }}</p>
        </div>
      </div>
    </div>
  </section>

  <!-- Impact Stories -->
  <section class="impact-stories">
    <div class="container">
      <h2>Active Campaigns</h2>
      <div class="stories-grid">
        <div class="story-card" *ngFor="let story of stories">
          <div class="story-image" *ngIf="story.imageUrl">
            <img [src]="normalizeImageUrl(story.imageUrl)" [alt]="story.title" />
          </div>
          <div class="story-image no-image" *ngIf="!story.imageUrl">
            {{ story.cause }}
          </div>

          <div class="story-content">
            <span class="story-badge">{{ story.cause }}</span>
            <h3>{{ story.title }}</h3>

            <div class="story-progress">
              <div class="progress-bar">
                <div class="progress-fill" [style.width.%]="story.progress"></div>
              </div>
              <div class="progress-stats">
                <span class="raised">₹{{ story.raised.toLocaleString('en-IN') }}</span>
                <span class="target">/ ₹{{ story.target.toLocaleString('en-IN') }}</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>

<app-footer></app-footer>
